<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🤖 Web Bot Browser</title>
<style>
  :root {
    --bg: #0b0d17;
    --panel: #141827;
    --panel-2: #1b2033;
    --border: #2a3146;
    --text: #e6e9f2;
    --muted: #8891ad;
    --accent: #6ee7ff;
    --good: #4ade80;
    --bad: #f87171;
    --gem: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100%;
    overflow: hidden;
  }
  body {
    background:
      radial-gradient(circle at 20% 10%, rgba(110, 231, 255, 0.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(251, 191, 36, 0.04), transparent 45%),
      var(--bg);
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  h1 { font-size: 18px; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }
  .subtitle { font-size: 11px; color: var(--muted); margin-left: 8px; }

  button, label.button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: inline-block;
  }
  button:hover, label.button:hover { border-color: var(--accent); }
  button.primary, label.button.primary {
    background: var(--accent);
    color: #001319;
    border-color: var(--accent);
    font-weight: 700;
  }
  button.active { background: var(--accent); color: #001319; border-color: var(--accent); }
  button.good.active { background: var(--good); color: #001a00; border-color: var(--good); }
  button.bad.active  { background: var(--bad); color: #1a0000; border-color: var(--bad); }
  button.gem.active  { background: var(--gem); color: #1a1200; border-color: var(--gem); }
  button.watching { background: var(--good); color: #001a00; border-color: var(--good); font-weight: 700; }
  input[type=file] { display: none; }

  .controls { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .filter-chip {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    cursor: pointer;
  }
  .filter-chip.active { color: var(--text); border-color: var(--accent); }
  .filter-chip.good.active { color: var(--good); border-color: var(--good); }
  .filter-chip.bad.active  { color: var(--bad);  border-color: var(--bad); }
  .filter-chip.gem.active  { color: var(--gem);  border-color: var(--gem); }

  /* Search bar */
  .search-bar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  #searchInput {
    flex: 1;
    min-width: 220px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 13px;
    outline: none;
  }
  #searchInput:focus { border-color: var(--accent); }
  .result-count { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* Main layout */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 280px 1fr;
    overflow: hidden;
  }
  @media (max-width: 720px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .sidebar.mobile-open { display: block; position: fixed; inset: 0; z-index: 50; }
  }

  .sidebar {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--panel);
  }
  .sidebar-head {
    padding: 10px 14px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }
  .topic-item {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .topic-item:hover { background: var(--panel-2); }
  .topic-item.active { background: var(--panel-2); border-left: 3px solid var(--accent); padding-left: 11px; }
  .topic-item .name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .topic-item .counts { font-size: 10px; color: var(--muted); }
  .topic-item .counts .g { color: var(--good); }
  .topic-item .counts .b { color: var(--bad); }
  .topic-item .counts .gm { color: var(--gem); }

  /* Content area */
  .content {
    overflow-y: auto;
    padding: 12px 16px 40px;
  }
  .content::-webkit-scrollbar { width: 8px; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .topic-header {
    padding: 10px 0 14px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .topic-header h2 { font-size: 20px; margin-bottom: 4px; }
  .topic-header .meta { font-size: 11px; color: var(--muted); }

  .section-head {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin: 18px 0 8px;
    display: flex;
    justify-content: space-between;
  }
  .section-head.good { color: var(--good); }
  .section-head.bad { color: var(--bad); }
  .section-head.gem { color: var(--gem); }

  .item {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    font-size: 13px;
    line-height: 1.5;
  }
  .item .src {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-right: 6px;
    cursor: pointer;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(110,231,255,0.08);
  }
  .item .src:hover { background: rgba(110,231,255,0.2); }
  .item.gem { border-left: 3px solid var(--gem); background: linear-gradient(90deg, rgba(251,191,36,0.08), var(--panel-2) 40%); }
  .item.gem .lesson { color: var(--gem); margin-top: 6px; font-weight: 600; font-size: 12px; }
  .item.gem .lesson::before { content: '💎 '; }

  mark {
    background: rgba(251,191,36,0.3);
    color: var(--text);
    padding: 1px 2px;
    border-radius: 3px;
  }

  .empty, .welcome {
    text-align: center;
    color: var(--muted);
    padding: 40px 20px;
    font-size: 13px;
    line-height: 1.6;
  }
  .welcome h2 { font-size: 18px; color: var(--text); margin-bottom: 10px; }
  .welcome code { background: var(--panel-2); padding: 2px 8px; border-radius: 4px; color: var(--accent); font-size: 12px; }

  .active-filters {
    padding: 6px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: none;
    gap: 6px;
    flex-wrap: wrap;
    font-size: 11px;
  }
  .active-filters.show { display: flex; }
  .active-filter {
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
  }
  .active-filter:hover { color: var(--text); border-color: var(--accent); }
  .active-filter .x { color: var(--bad); margin-left: 6px; }

  .watch-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--good);
    margin-right: 6px;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
</style>
</head>
<body>

<header>
  <div>
    <h1>🤖 Web Bot Browser <span class="subtitle" id="subtitle">Load a feed JSON to begin</span></h1>
  </div>
  <div class="controls">
    <label class="button primary" for="fileInput">📂 Load Feed</label>
    <input type="file" id="fileInput" accept=".json,application/json">
    <button id="watchBtn" title="Auto-refresh when the file changes">👁 Watch</button>
    <button id="allViewBtn">📋 All Topics</button>
    <button id="clearBtn">Clear</button>
  </div>
</header>

<div class="search-bar">
  <input id="searchInput" type="text" placeholder="🔎 Search every item (e.g. 'ragdoll', 'mobile', 'DataStore') — press Enter or type" autocomplete="off">
  <button class="filter-chip good active" data-filter="good">✅ Good</button>
  <button class="filter-chip bad active"  data-filter="bad">❌ Complaints</button>
  <button class="filter-chip gem active"  data-filter="gem">💎 Gems</button>
  <span class="result-count" id="resultCount"></span>
</div>

<div class="active-filters" id="activeFilters"></div>

<div class="main">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <span>Topics (<span id="topicCount">0</span>)</span>
    </div>
    <div id="topicList"></div>
  </aside>

  <section class="content" id="content">
    <div class="welcome">
      <h2>🤖 Web Bot Browser</h2>
      <p>Click <strong>📂 Load Feed</strong> and pick <code>webbot-feed.json</code>.</p>
      <p style="margin-top:10px">Then — search, filter, click topics or source tags to navigate.</p>
    </div>
  </section>
</div>

<script>
const $ = id => document.getElementById(id);
const fileInput = $('fileInput');
const watchBtn = $('watchBtn');
const allViewBtn = $('allViewBtn');
const clearBtn = $('clearBtn');
const searchInput = $('searchInput');
const content = $('content');
const topicList = $('topicList');
const topicCount = $('topicCount');
const subtitle = $('subtitle');
const resultCount = $('resultCount');
const activeFiltersEl = $('activeFilters');

let feed = null;
let selectedTopic = null;
let allMode = true;
let filters = { good: true, bad: true, gem: true };
let sourceFilter = null;
let query = '';

let watching = false;
let watchHandle = null;
let watchTimer = null;
let lastHash = '';

function esc(s) {
  return String(s || '').replaceAll(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}
function parseItem(raw) {
  const m = /^\s*\[([^\]]+)\]\s*(.*)$/.exec(raw || '');
  if (m) return { source: m[1], text: m[2] };
  return { source: 'unknown', text: raw || '' };
}
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = Math.trunc((h << 5) - h + s.codePointAt(i));
  return h.toString(36);
}

function renderSidebar() {
  topicList.innerHTML = '';
  const topics = feed?.topics || [];
  topicCount.textContent = topics.length;
  const filterQ = query.toLowerCase();
  topics.forEach((t, idx) => {
    // hide topic if search doesn't match anything in it
    if (filterQ) {
      const blob = JSON.stringify(t).toLowerCase();
      if (!blob.includes(filterQ)) return;
    }
    const div = document.createElement('div');
    div.className = 'topic-item' + (!allMode && selectedTopic === idx ? ' active' : '');
    const g = (t.good || []).length, b = (t.bad || []).length, gm = (t.gems || []).length;
    div.innerHTML = `
      <div class="name">${esc(t.topic)}</div>
      <div class="counts"><span class="g">${g} good</span> · <span class="b">${b}</span> · <span class="gm">💎 ${gm}</span></div>
    `;
    div.addEventListener('click', () => {
      allMode = false;
      selectedTopic = idx;
      renderSidebar();
      renderContent();
    });
    topicList.appendChild(div);
  });
}

function matchesSearch(text, q) {
  if (!q) return true;
  return text.toLowerCase().includes(q.toLowerCase());
}

function renderActiveFilters() {
  const chips = [];
  if (sourceFilter) chips.push({label: `Source: ${sourceFilter}`, clear: () => { sourceFilter = null; renderContent(); renderActiveFilters(); }});
  if (chips.length === 0) { activeFiltersEl.classList.remove('show'); activeFiltersEl.innerHTML = ''; return; }
  activeFiltersEl.classList.add('show');
  activeFiltersEl.innerHTML = '';
  chips.forEach(c => {
    const b = document.createElement('span');
    b.className = 'active-filter';
    b.innerHTML = `${esc(c.label)} <span class="x">✕</span>`;
    b.addEventListener('click', c.clear);
    activeFiltersEl.appendChild(b);
  });
}

function renderContent() {
  if (!feed) return;
  content.innerHTML = '';
  const topics = feed.topics || [];
  const q = query.trim();

  let displayed = allMode
    ? topics.map((t, i) => ({topic: t, idx: i}))
    : (selectedTopic != null ? [{topic: topics[selectedTopic], idx: selectedTopic}] : []);

  if (q) {
    displayed = topics.map((t, i) => ({topic: t, idx: i}));
  }

  let totalShown = 0;
  displayed.forEach(({topic, idx}) => {
    const block = renderTopicBlock(topic, idx, q);
    if (block.shown > 0 || (!q && !sourceFilter)) {
      content.appendChild(block.el);
      totalShown += block.shown;
    }
  });

  if (totalShown === 0 && (q || sourceFilter)) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.innerHTML = `No items match <mark>${esc(q || sourceFilter)}</mark>. Try another search or click a topic in the sidebar.`;
    content.appendChild(empty);
  }

  resultCount.textContent = totalShown > 0 ? `${totalShown} items` : '';
}

function renderTopicBlock(topicData, idx, q) {
  const el = document.createElement('div');
  let shown = 0;

  const header = document.createElement('div');
  header.className = 'topic-header';
  header.innerHTML = `
    <h2>${highlight(topicData.topic, q)}</h2>
    <div class="meta">
      ✅ ${(topicData.good || []).length} · ❌ ${(topicData.bad || []).length} · 💎 ${(topicData.gems || []).length}
    </div>
  `;
  el.appendChild(header);

  if (filters.good && (topicData.good || []).length) {
    const sec = document.createElement('div');
    sec.className = 'section-head good';
    sec.innerHTML = `<span>✅ Good</span>`;
    const list = document.createElement('div');
    let n = 0;
    topicData.good.forEach(raw => {
      const {source, text} = parseItem(raw);
      if (!passesFilters(source, text, q)) return;
      list.appendChild(makeItem(source, text, q, false));
      n++;
    });
    if (n > 0) { el.appendChild(sec); el.appendChild(list); shown += n; }
  }

  if (filters.bad && (topicData.bad || []).length) {
    const sec = document.createElement('div');
    sec.className = 'section-head bad';
    sec.innerHTML = `<span>❌ Complaints</span>`;
    const list = document.createElement('div');
    let n = 0;
    topicData.bad.forEach(raw => {
      const {source, text} = parseItem(raw);
      if (!passesFilters(source, text, q)) return;
      list.appendChild(makeItem(source, text, q, false));
      n++;
    });
    if (n > 0) { el.appendChild(sec); el.appendChild(list); shown += n; }
  }

  if (filters.gem && (topicData.gems || []).length) {
    const sec = document.createElement('div');
    sec.className = 'section-head gem';
    sec.innerHTML = `<span>💎 Gems</span>`;
    const list = document.createElement('div');
    let n = 0;
    topicData.gems.forEach(gem => {
      const comp = parseItem(gem.complaint || '');
      const combined = comp.text + ' ' + (gem.lesson || '');
      if (!passesFilters(comp.source, combined, q)) return;
      list.appendChild(makeGemItem(comp.source, comp.text, gem.lesson || '', q));
      n++;
    });
    if (n > 0) { el.appendChild(sec); el.appendChild(list); shown += n; }
  }

  return { el, shown };
}

function passesFilters(source, text, q) {
  if (sourceFilter && !source.toLowerCase().includes(sourceFilter.toLowerCase())) return false;
  if (q && !(text.toLowerCase().includes(q.toLowerCase()) || source.toLowerCase().includes(q.toLowerCase()))) return false;
  return true;
}

function makeItem(source, text, q, isGem) {
  const div = document.createElement('div');
  div.className = 'item' + (isGem ? ' gem' : '');
  div.innerHTML = `<span class="src">${esc(source)}</span>${highlight(text, q)}`;
  const srcEl = div.querySelector('.src');
  srcEl.addEventListener('click', e => {
    e.stopPropagation();
    sourceFilter = source;
    renderActiveFilters();
    renderContent();
  });
  return div;
}

function makeGemItem(source, complaintText, lessonText, q) {
  const div = document.createElement('div');
  div.className = 'item gem';
  div.innerHTML = `
    <span class="src">${esc(source)}</span>${highlight(complaintText, q)}
    <div class="lesson">${highlight(lessonText, q)}</div>
  `;
  const srcEl = div.querySelector('.src');
  srcEl.addEventListener('click', e => {
    e.stopPropagation();
    sourceFilter = source;
    renderActiveFilters();
    renderContent();
  });
  return div;
}

function renderFeed(f, animateChanges = false) {
  const incomingHash = hashStr(JSON.stringify(f));
  const unchanged = incomingHash === lastHash;
  lastHash = incomingHash;
  feed = f;
  const total = (f.topics || []).reduce((n, t) => n + (t.good?.length||0) + (t.bad?.length||0) + (t.gems?.length||0), 0);
  subtitle.textContent = `${(f.topics||[]).length} topics · ${total} items · generated ${f.generated ? new Date(f.generated).toLocaleString() : 'unknown'} ${watching ? '· live' : ''}`;
  try { localStorage.setItem('webbot.cachedFeed', JSON.stringify(f)); } catch {}
  renderSidebar();
  renderContent();
}

async function loadFromFile(file) {
  try {
    const f = JSON.parse(await file.text());
    renderFeed(f);
  } catch (err) {
    alert('Bad JSON: ' + err.message);
  }
}

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadFromFile(file);
});

async function startWatching() {
  if (!('showOpenFilePicker' in globalThis)) {
    alert("Your browser doesn't support file watching. Use Chrome or Edge.");
    return;
  }
  try {
    const [handle] = await globalThis.showOpenFilePicker({
      types: [{ description: 'Web Bot feed', accept: { 'application/json': ['.json'] } }],
      multiple: false,
    });
    watchHandle = handle;
    watching = true;
    watchBtn.classList.add('watching');
    watchBtn.innerHTML = '<span class="watch-dot"></span>Watching';
    const file = await handle.getFile();
    await loadFromFile(file);
    watchTimer = setInterval(async () => {
      if (!watchHandle) return;
      try {
        const f = await watchHandle.getFile();
        await loadFromFile(f);
      } catch {
        stopWatching();
      }
    }, 20000);
  } catch (err) {
    console.log('watch cancelled', err);
  }
}
function stopWatching() {
  watching = false;
  watchHandle = null;
  if (watchTimer) { clearInterval(watchTimer); watchTimer = null; }
  watchBtn.classList.remove('watching');
  watchBtn.textContent = '👁 Watch';
}

watchBtn.addEventListener('click', () => { if (watching) stopWatching(); else startWatching(); });

allViewBtn.addEventListener('click', () => {
  allMode = true;
  selectedTopic = null;
  renderSidebar();
  renderContent();
});

clearBtn.addEventListener('click', () => {
  stopWatching();
  feed = null;
  lastHash = '';
  localStorage.removeItem('webbot.cachedFeed');
  fileInput.value = '';
  topicList.innerHTML = '';
  content.innerHTML = '<div class="welcome"><h2>🤖 Web Bot Browser</h2><p>Click <strong>📂 Load Feed</strong> and pick <code>webbot-feed.json</code>.</p></div>';
  topicCount.textContent = '0';
  subtitle.textContent = 'Load a feed JSON to begin';
  resultCount.textContent = '';
});

document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const f = chip.dataset.filter;
    filters[f] = !filters[f];
    chip.classList.toggle('active');
    renderContent();
  });
});

let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    query = searchInput.value.trim();
    renderSidebar();
    renderContent();
  }, 150);
});

// Load cached feed on open
try {
  const cached = localStorage.getItem('webbot.cachedFeed');
  if (cached) renderFeed(JSON.parse(cached));
} catch {}

searchInput.focus();
</script>
</body>
</html>
